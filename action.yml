name: "Pi Code Review"
description: "AI-powered code review using Pi. Posts inline comments on PR files."
branding:
  icon: "eye"
  color: "purple"

inputs:
  model:
    description: "Single model in provider/model format. Ignored when 'models' is set."
    required: false
    default: ""
  models:
    description: "Comma-separated list of models to randomly choose from (e.g. 'openai/gpt-5.4, anthropic/claude-sonnet-4-20250514'). One is picked at random per run."
    required: false
    default: ""
  thinking:
    description: "Optional thinking level (e.g. off, minimal, low, medium, high, xhigh)"
    required: false
    default: ""
  github_token:
    description: "GitHub token for posting review comments. Defaults to the built-in GITHUB_TOKEN."
    required: false
    default: ${{ github.token }}
  pi_version:
    description: "Pi version to install (default: latest)"
    required: false
    default: "latest"
  review_prompt:
    description: "Custom review prompt to append to the default instructions. Use this to add project-specific review criteria."
    required: false
    default: ""
  max_diff_size:
    description: "Maximum diff size in bytes before truncation (default: 100000)"
    required: false
    default: "100000"
  extra_env:
    description: "Extra environment variables to pass to Pi as KEY=VALUE lines"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install Pi
      shell: bash
      run: |
        if command -v pi &>/dev/null; then
          echo "Pi already installed: $(pi --version)"
        else
          echo "Installing Pi..."
          npm install -g @mariozechner/pi-coding-agent@${{ inputs.pi_version }}
        fi

    - name: Select model
      id: select-model
      shell: bash
      run: |
        MODELS_CSV="${{ inputs.models }}"
        SINGLE="${{ inputs.model }}"

        if [ -n "$MODELS_CSV" ]; then
          IFS=',' read -ra CANDIDATES <<< "$MODELS_CSV"
        elif [ -n "$SINGLE" ]; then
          CANDIDATES=("$SINGLE")
        else
          echo "::error::Either 'model' or 'models' input must be provided."
          exit 1
        fi

        TRIMMED=()
        for m in "${CANDIDATES[@]}"; do
          t="$(echo "$m" | xargs)"
          [ -n "$t" ] && TRIMMED+=("$t")
        done

        if [ "${#TRIMMED[@]}" -eq 0 ]; then
          echo "::error::No valid models found in input."
          exit 1
        fi

        SELECTED="${TRIMMED[$((RANDOM % ${#TRIMMED[@]}))]}"
        echo "model=${SELECTED}" >> "$GITHUB_OUTPUT"
        echo "::notice::Selected model: ${SELECTED}"

    - name: Run review
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        INPUT_MODEL: ${{ steps.select-model.outputs.model }}
        INPUT_VARIANT: ${{ inputs.thinking }}
        INPUT_REVIEW_PROMPT: ${{ inputs.review_prompt }}
        INPUT_MAX_DIFF_SIZE: ${{ inputs.max_diff_size }}
        INPUT_EXTRA_ENV: ${{ inputs.extra_env }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
        # Pi has no permission popups by default
      run: |
        # Export any extra env vars the user passed
        if [ -n "$INPUT_EXTRA_ENV" ]; then
          while IFS= read -r line; do
            [ -n "$line" ] && export "$line"
          done <<< "$INPUT_EXTRA_ENV"
        fi

        bash "${{ github.action_path }}/scripts/review.sh"
